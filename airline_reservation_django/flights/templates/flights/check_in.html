{% extends 'flights/base.html' %}

{% block title %}Check-In — Airline Reservation{% endblock %}

{% block content %}
<h1 class="page-title">Check-In Verification</h1>
<p class="page-subtitle">Please confirm your passenger details before completing check-in.</p>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<div class="card">
    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label" for="first_name">First Name</label>
            <input class="form-control" type="text" name="first_name" id="first_name" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="last_name">Last Name</label>
            <input class="form-control" type="text" name="last_name" id="last_name" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="id_number">ID Number (OIB)</label>
            <input class="form-control" type="text" name="id_number" id="id_number" required>
        </div>

        <div class="mt-3 gap-sm">
            <button type="submit" class="btn btn-success">Confirm Check-In</button>
            <a href="{% url 'about_ticket' ticket.id %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
