{% extends 'flights/base.html' %}

{% block title %}Create Flight — Airline Reservation{% endblock %}

{% block content %}
<h1 class="page-title">Create New Flight</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}
        <div class="django-form">
            {{ form.as_p }}
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Create Flight</button>
        </div>
    </form>
</div>

<div class="mt-2 text-center">
    <a href="{% url 'flight_list' %}">Back to Flight List</a>
</div>
{% endblock %}
