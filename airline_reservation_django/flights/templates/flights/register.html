{% extends 'flights/base.html' %}

{% block title %}Create Account — Airline Reservation{% endblock %}

{% block content %}
<h1 class="page-title">Create Account</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}
        <div class="django-form">
            {{ form.as_p }}
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-red">Register</button>
        </div>
    </form>
</div>

<div class="mt-2 text-center">
    <a href="{% url 'login' %}">Already have an account? Log in</a>
</div>
{% endblock %}
