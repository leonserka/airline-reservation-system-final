{% extends 'flights/base.html' %}

{% block title %}Reset Password — Airline Reservation{% endblock %}

{% block content %}
<h1 class="page-title">Reset Your Password</h1>
<p class="page-subtitle">Enter your email address and we will send you a link to reset your password.</p>

<div class="card">
    <form method="post">
        {% csrf_token %}
        <div class="django-form">
            {{ form.as_p }}
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Send Reset Link</button>
        </div>
    </form>
</div>

<div class="mt-2 text-center">
    <a href="{% url 'login' %}">Back to login</a>
</div>
{% endblock %}
